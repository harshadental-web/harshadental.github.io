<!DOCTYPE html>
<html>
<head>
<title>Harsha Dental Clinic</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    color:white;
    background: linear-gradient(-45deg, #0f2027, #2c5364, #00c6ff, #0072ff);
    background-size: 400% 400%;
    animation: bg 12s infinite;
}
@keyframes bg {
    0%{background-position:0%}
    50%{background-position:100%}
    100%{background-position:0%}
}

.hero {
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.btn {
    padding:12px 25px;
    background:#00c6ff;
    border-radius:30px;
    text-decoration:none;
    color:white;
}

.card {
    background: rgba(255,255,255,0.1);
    margin:20px;
    padding:20px;
    border-radius:15px;
    backdrop-filter: blur(10px);
    text-align:center;
}

.gallery img {
    width:250px;
    margin:10px;
    border-radius:10px;
}

.whatsapp {
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    color:white;
    padding:15px;
    border-radius:50%;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="hero">
    <h1>Harsha Multi Speciality Dental Clinic</h1>
    <p>✨ Redefining Painless Dentistry ✨</p>
    <a class="btn" href="#contact">Book Appointment</a>
</div>

<div class="card">
    <h2>🦷 Our Services</h2>
    <p>Teeth Whitening | Root Canal | Implants | Laser Dentistry | Surgery</p>
</div>

<!-- SLIDER -->
<div class="card">
    <h2>🏥 Clinic View</h2>
    <img id="slide" src="images/clinic1.jpg" width="80%">
</div>

<!-- GALLERY -->
<div class="card">
    <h2>📸 Gallery</h2>

    <!-- 🔥 IMAGE LINKS -->
    <img src="images/clinic1.jpg">
    <img src="images/clinic2.jpg">
    <img src="images/clinic3.jpg">
    <img src="images/clinic4.jpg">
    <img src="images/reception.jpg">
    <img src="images/doctor.jpg">

</div>

<!-- CONTACT -->
<div class="card" id="contact">
    <h2>📍 Contact</h2>
    <p>Sri Lakshmi Complex, Kakinada</p>
    <p>📞 6302962577</p>

    <a class="btn" href="https://www.instagram.com/harshadentalclinic">Instagram</a>
    <a class="btn" href="https://www.youtube.com/@harshadentalclinickakinada">YouTube</a>
</div>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/916302962577">💬</a>

<!-- SLIDER SCRIPT -->
<script>
let images = [
"images/clinic1.jpg",
"images/clinic2.jpg",
"images/clinic3.jpg",
"images/clinic4.jpg",
"images/reception.jpg"
];

let i = 0;

setInterval(function(){
    document.getElementById("slide").src = images[i];
    i++;
    if(i >= images.length){ i = 0; }
}, 2000);
</script>

</body>
</html>
