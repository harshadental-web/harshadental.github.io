<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Harsha Multi-Speciality Dental Clinic</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
background:#0b0f19;
color:white;
overflow-x:hidden;
}

/* NAV */
nav{
position:fixed;
width:100%;
top:0;
display:flex;
justify-content:space-between;
padding:20px 40px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
z-index:1000;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
opacity:0.7;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:60px;
background:linear-gradient(90deg,#00c6ff,#0072ff);
-webkit-background-clip:text;
color:transparent;
}

.hero p{
opacity:0.7;
font-size:20px;
}

/* BUTTON */
.btn{
margin-top:20px;
padding:14px 30px;
border-radius:30px;
border:none;
background:white;
color:black;
cursor:pointer;
}

/* SECTION */
section{
padding:120px 10%;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:40px;
}

/* SERVICE */
.service{
text-align:center;
transition:0.5s;
}

.service:hover{
transform:translateY(-15px);
}

.service i{
font-size:30px;
margin-bottom:10px;
color:#00c6ff;
}

/* TEXT BLOCK */
.text-block{
max-width:700px;
margin:auto;
text-align:center;
}

/* GALLERY */
.gallery{
display:flex;
overflow:auto;
gap:20px;
}

.gallery img{
height:250px;
border-radius:15px;
}

/* VIDEO */
.video{
margin-top:40px;
border-radius:20px;
overflow:hidden;
}

/* POPUP */
.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
padding:50px;
}

.close{
position:absolute;
top:20px;
right:30px;
font-size:30px;
cursor:pointer;
}

/* FLOAT */
.float{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
}

/* SCROLL ANIMATION */
.fade{
opacity:0;
transform:translateY(50px);
transition:1s;
}

.fade.show{
opacity:1;
transform:translateY(0);
}

</style>
</head>

<body>

<nav>
<b>Harsha Dental</b>
<div>
<a href="#home">Home</a>
<a href="#services">Treatments</a>
<a href="#contact">Contact</a>
</div>
</nav>

<!-- HERO -->
<div class="hero" id="home">
<h1>Harsha Dental Clinic</h1>
<p>World-Class Dental Care in Kakinada</p>

<a href="tel:6302962577">
<button class="btn">Book Appointment</button>
</a>
</div>

<!-- ABOUT -->
<section class="fade">
<div class="text-block">
<h2>Premium Dental Experience</h2>
<p>We provide advanced, painless, and modern dental treatments using the latest technology.</p>
</div>
</section>

<!-- SERVICES -->
<section id="services" class="fade">
<h2 style="text-align:center;">Treatments</h2>

<div class="grid">

<div class="service" onclick="openPopup('root')">
<i class="fa-solid fa-tooth"></i>
<h3>Root Canal</h3>
</div>

<div class="service" onclick="openPopup('white')">
<i class="fa-solid fa-star"></i>
<h3>Whitening</h3>
</div>

<div class="service" onclick="openPopup('implant')">
<i class="fa-solid fa-screwdriver-wrench"></i>
<h3>Implants</h3>
</div>

</div>
</section>

<!-- GALLERY -->
<section class="fade">
<h2>Clinic</h2>

<div class="gallery">
<img src="clinic1.jpg.jpeg">
<img src="clinic2.jpg.jpeg">
<img src="clinic3.jpg.jpeg">
<img src="clinic4.jpg.jpeg">
</div>
</section>

<!-- VIDEO -->
<section class="fade">
<h2>Clinic Video</h2>

<div class="video">
<iframe width="100%" height="400"
src="https://www.youtube.com/embed/dQw4w9WgXcQ"
allowfullscreen></iframe>
</div>

</section>

<!-- CONTACT -->
<section id="contact" class="fade">
<h2>Location</h2>

<iframe src="https://maps.google.com/maps?q=Kakinada&t=&z=13&output=embed"
width="100%" height="300"></iframe>

</section>

<!-- POPUP -->
<div id="popup" class="popup">
<span class="close" onclick="closePopup()">✖</span>

<h1 id="title"></h1>
<p id="desc"></p>
<div id="details"></div>

</div>

<a href="https://wa.me/916302962577" class="float">💬</a>

<script>

/* POPUP */
function openPopup(type){
let t="",d="",details="";

if(type=="root"){
t="Root Canal";
d="Advanced painless treatment";
details="<p>Removes infection and saves natural tooth.</p>";
}

if(type=="white"){
t="Whitening";
d="Bright smile treatment";
details="<p>Professional whitening process.</p>";
}

if(type=="implant"){
t="Implants";
d="Permanent teeth replacement";
details="<p>Strong and natural solution.</p>";
}

document.getElementById("title").innerHTML=t;
document.getElementById("desc").innerHTML=d;
document.getElementById("details").innerHTML=details;

document.getElementById("popup").style.display="block";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

/* SCROLL ANIMATION */
const items=document.querySelectorAll('.fade');

window.addEventListener('scroll',()=>{
items.forEach(el=>{
let pos=el.getBoundingClientRect().top;
if(pos<window.innerHeight-100){
el.classList.add('show');
}
});
});

</script>

</body>
</html>
