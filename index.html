<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Harsha Multi-Speciality Dental Clinic</title>

<!-- FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">

<!-- ICONS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* COLORS */
:root{
--primary:#7c3aed;
--secondary:#06b6d4;
--dark:#0b0f19;
--text:#e5e7eb;
}

body{
margin:0;
font-family:'Inter',sans-serif;
background:var(--dark);
color:var(--text);
overflow-x:hidden;
}

/* NAV */
nav{
position:fixed;
width:100%;
top:0;
display:flex;
justify-content:space-between;
padding:20px 40px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
z-index:1000;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
opacity:0.7;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-family:'Space Grotesk',sans-serif;
font-size:55px;
background:linear-gradient(90deg,var(--primary),var(--secondary));
-webkit-background-clip:text;
color:transparent;
animation:fadeUp 1.2s ease;
}

.hero p{
opacity:0.7;
font-size:20px;
animation:fadeUp 1.8s ease;
}

/* BUTTON */
.btn{
margin-top:20px;
padding:14px 30px;
border-radius:30px;
border:none;
background:linear-gradient(45deg,var(--primary),var(--secondary));
color:white;
cursor:pointer;
transition:0.4s;
}

.btn:hover{
transform:scale(1.08);
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* SECTION */
section{
padding:100px 10%;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:40px;
}

/* SERVICES */
.service{
text-align:center;
padding:20px;
border-radius:20px;
background:rgba(255,255,255,0.03);
transition:0.4s;
cursor:pointer;
}

.service:hover{
transform:translateY(-12px) scale(1.03);
box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

.service i{
font-size:30px;
color:var(--secondary);
margin-bottom:10px;
}

/* POPUP */
.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
padding:50px;
}

.close{
position:absolute;
top:20px;
right:30px;
font-size:30px;
cursor:pointer;
}

/* GALLERY */
.slider{
display:flex;
overflow:hidden;
border-radius:20px;
}

.slider img{
width:100%;
flex-shrink:0;
}

/* VIDEO */
.video{
margin-top:30px;
border-radius:20px;
overflow:hidden;
}

/* SOCIAL */
.social-box{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
}

.social{
padding:25px;
border-radius:20px;
text-align:center;
width:220px;
color:white;
text-decoration:none;
transition:0.4s;
}

.insta{
background:linear-gradient(45deg,#f58529,#dd2a7b,#8134af);
}

.youtube{
background:#ff0000;
}

.social:hover{
transform:translateY(-10px) scale(1.05);
}

/* FLOAT */
.float{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
}

/* ANIMATION */
.fade{
opacity:0;
transform:translateY(50px);
transition:1s;
}

.fade.show{
opacity:1;
transform:translateY(0);
}

@keyframes fadeUp{
from{opacity:0; transform:translateY(40px);}
to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<nav>
<b>Harsha Dental</b>
<div>
<a href="#services">Treatments</a>
<a href="#contact">Contact</a>
</div>
</nav>

<!-- HERO -->
<div class="hero">
<h1>Harsha Dental Clinic</h1>
<p>Premium Dental Care in Kakinada</p>

<a href="tel:6302962577">
<button class="btn">Book Appointment</button>
</a>
</div>

<!-- SERVICES -->
<section id="services" class="fade">
<h2 style="text-align:center;">Treatments</h2>

<div class="grid">

<div class="service" onclick="openPopup('root')">
<i class="fa-solid fa-tooth"></i>
<h3>Root Canal</h3>
</div>

<div class="service" onclick="openPopup('white')">
<i class="fa-solid fa-star"></i>
<h3>Whitening</h3>
</div>

<div class="service" onclick="openPopup('implant')">
<i class="fa-solid fa-screwdriver-wrench"></i>
<h3>Implants</h3>
</div>

</div>
</section>

<!-- GALLERY -->
<section class="fade">
<h2>Clinic Gallery</h2>

<div class="slider">
<img src="clinic1.jpg.jpeg">
<img src="clinic2.jpg.jpeg">
<img src="clinic3.jpg.jpeg">
<img src="clinic4.jpg.jpeg">
</div>
</section>

<!-- VIDEO -->
<section class="fade">
<h2>Clinic Video</h2>

<div class="video">
<iframe width="100%" height="400"
src="https://www.youtube.com/embed/dQw4w9WgXcQ"
allowfullscreen></iframe>
</div>
</section>

<!-- SOCIAL -->
<section class="fade">
<h2 style="text-align:center;">Connect With Us</h2>

<div class="social-box">

<a href="#" class="social insta">
<i class="fa-brands fa-instagram"></i>
<p>Instagram</p>
</a>

<a href="#" class="social youtube">
<i class="fa-brands fa-youtube"></i>
<p>YouTube</p>
</a>

</div>
</section>

<!-- CONTACT -->
<section id="contact" class="fade">
<h2>Location</h2>

<iframe src="https://maps.google.com/maps?q=Kakinada&t=&z=13&output=embed"
width="100%" height="300"></iframe>

</section>

<!-- POPUP -->
<div id="popup" class="popup">
<span class="close" onclick="closePopup()">✖</span>

<h1 id="title"></h1>
<p id="desc"></p>
<div id="details"></div>

</div>

<a href="https://wa.me/916302962577" class="float">💬</a>

<script>

/* POPUP */
function openPopup(type){
let t="",d="",details="";

if(type=="root"){
t="Root Canal";
d="Painless treatment";
details="<p>Removes infection and saves tooth.</p>";
}

if(type=="white"){
t="Whitening";
d="Bright smile";
details="<p>Professional whitening.</p>";
}

if(type=="implant"){
t="Implants";
d="Permanent solution";
details="<p>Natural looking teeth replacement.</p>";
}

document.getElementById("title").innerHTML=t;
document.getElementById("desc").innerHTML=d;
document.getElementById("details").innerHTML=details;

document.getElementById("popup").style.display="block";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

/* SLIDER */
let i=0;
setInterval(()=>{
let slides=document.querySelectorAll(".slider img");
slides.forEach(img=>{
img.style.transform=`translateX(-${i*100}%)`;
});
i++;
if(i===slides.length) i=0;
},3000);

/* SCROLL */
const items=document.querySelectorAll('.fade');

window.addEventListener('scroll',()=>{
items.forEach(el=>{
let pos=el.getBoundingClientRect().top;
if(pos<window.innerHeight-100){
el.classList.add('show');
}
});
});

/* SMOOTH SCROLL */
document.querySelectorAll("a[href^='#']").forEach(anchor=>{
anchor.addEventListener("click",function(e){
e.preventDefault();
document.querySelector(this.getAttribute("href")).scrollIntoView({
behavior:"smooth"
});
});
});

</script>

</body>
</html>
