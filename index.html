<script>
function openPopup(type){

let t="",d="";

if(type=="root"){
t="Root Canal Treatment";
d="Root canal treatment is an advanced dental procedure used to treat infection inside the tooth.\n\nIt helps in removing damaged pulp, cleaning the root canals, and sealing the tooth.\n\n✔ Painless procedure\n✔ Saves natural tooth\n✔ Long-lasting solution";
}

if(type=="fill"){
t="Teeth Fillings";
d="Dental fillings are used to repair teeth affected by cavities or minor damage.\n\nThe decayed portion is removed and filled with high-quality materials to restore strength.\n\n✔ Restores tooth structure\n✔ Prevents further decay\n✔ Durable results";
}

if(type=="dentures"){
t="Dentures";
d="Dentures are removable dental appliances used to replace missing teeth and surrounding tissues.\n\nThey are custom-made for comfort and natural appearance.\n\n✔ Improves chewing ability\n✔ Enhances smile\n✔ Comfortable fit";
}

if(type=="implant"){
t="Dental Implants";
d="Dental implants are permanent solutions for missing teeth using titanium posts placed in the jawbone.\n\nThey function like natural teeth and provide strong support for artificial teeth.\n\n✔ Natural look\n✔ Strong & durable\n✔ Long-term solution";
}

if(type=="braces"){
t="Teeth Braces";
d="Braces are orthodontic devices used to correct crooked or misaligned teeth.\n\nThey gradually shift teeth into proper alignment for better function and appearance.\n\n✔ Improves bite\n✔ Straightens teeth\n✔ Enhances smile";
}

if(type=="aligners"){
t="Clear Aligners";
d="Clear aligners are modern orthodontic solutions that straighten teeth without metal braces.\n\nThey are transparent, removable, and comfortable to wear.\n\n✔ Nearly invisible\n✔ Easy to maintain\n✔ Comfortable fit";
}

if(type=="clean"){
t="Teeth Cleaning";
d="Teeth cleaning is a preventive procedure that removes plaque, tartar, and stains.\n\nIt helps maintain healthy gums and prevents oral diseases.\n\n✔ Fresh breath\n✔ Healthy gums\n✔ Prevents decay";
}

if(type=="white"){
t="Teeth Whitening";
d="Teeth whitening is a cosmetic dental procedure designed to lighten the color of teeth.\n\nIt removes stains caused by food, drinks, and aging.\n\n✔ Brighter smile\n✔ Safe & effective\n✔ Instant results";
}

if(type=="smile"){
t="Smile Designing";
d="Smile designing is a comprehensive cosmetic procedure to enhance the appearance of your smile.\n\nIt involves multiple treatments tailored to your facial features.\n\n✔ Improves confidence\n✔ Personalized treatment\n✔ Natural results";
}

document.getElementById("title").innerText=t;
document.getElementById("desc").innerText=d;

document.getElementById("popup").style.display="block";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}
</script>
