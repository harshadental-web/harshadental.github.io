<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Harsha Dental Clinic</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:'Outfit',sans-serif;
background:linear-gradient(135deg,#0f172a,#1e3a8a,#0ea5a4);
color:white;
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
padding:20px 40px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
position:sticky;
top:0;
}

/* HERO */
.hero{
text-align:center;
padding:100px 20px;
}

.hero h1{
font-size:55px;
}

.hero p{
opacity:0.8;
}

/* BUTTON */
.btn{
padding:14px 30px;
border-radius:30px;
border:none;
background:white;
color:#0ea5a4;
cursor:pointer;
margin-top:20px;
}

/* SECTION */
section{
padding:60px 10%;
}

/* GLASS CARD */
.card{
background:rgba(255,255,255,0.1);
padding:25px;
border-radius:20px;
backdrop-filter:blur(20px);
margin:20px 0;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

/* SERVICE */
.service{
text-align:center;
padding:20px;
border-radius:15px;
background:rgba(255,255,255,0.1);
cursor:pointer;
transition:0.4s;
}

.service:hover{
transform:translateY(-10px) scale(1.05);
}

.service i{
font-size:30px;
color:#00f2fe;
}

/* GALLERY */
.gallery{
display:flex;
gap:15px;
overflow:auto;
}

.gallery img{
height:200px;
border-radius:15px;
}

/* POPUP */
.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
padding:40px;
}

.close{
position:absolute;
top:20px;
right:20px;
cursor:pointer;
}

/* SOCIAL */
.social{
display:flex;
justify-content:center;
gap:20px;
}

.social a{
padding:15px;
border-radius:10px;
text-decoration:none;
color:white;
}

.insta{background:#e1306c;}
.youtube{background:red;}

</style>
</head>

<body>

<nav>
<b>🦷 Harsha Dental</b>
</nav>

<!-- HERO -->
<div class="hero">
<h1>Redefining Dental Care</h1>
<p>Modern • Painless • Advanced Treatments in Kakinada</p>

<a href="tel:6302962577">
<button class="btn">Book Appointment</button>
</a>
</div>

<!-- ABOUT -->
<section>
<div class="card">
<h2>About Clinic</h2>
<p>Advanced dental treatments with precision, comfort and modern technology.</p>
</div>
</section>

<!-- SERVICES -->
<section>
<h2 style="text-align:center;">Treatments</h2>

<div class="grid">

<div class="service" onclick="openPopup('root')">
<i class="fa-solid fa-tooth"></i>
<h3>Root Canal</h3>
</div>

<div class="service" onclick="openPopup('white')">
<i class="fa-solid fa-star"></i>
<h3>Whitening</h3>
</div>

<div class="service" onclick="openPopup('implant')">
<i class="fa-solid fa-screwdriver-wrench"></i>
<h3>Implants</h3>
</div>

</div>
</section>

<!-- GALLERY -->
<section>
<h2>Clinic</h2>

<div class="gallery">
<img src="clinic1.jpg.jpeg">
<img src="clinic2.jpg.jpeg">
<img src="clinic3.jpg.jpeg">
</div>

</section>

<!-- SOCIAL -->
<section>
<h2 style="text-align:center;">Connect</h2>

<div class="social">
<a href="#" class="insta">Instagram</a>
<a href="#" class="youtube">YouTube</a>
</div>

</section>

<!-- POPUP -->
<div id="popup" class="popup">
<span class="close" onclick="closePopup()">✖</span>
<h2 id="title"></h2>
<p id="desc"></p>
</div>

<script>

function openPopup(type){
let t="",d="";
if(type=="root"){t="Root Canal";d="Painless treatment";}
if(type=="white"){t="Whitening";d="Bright smile";}
if(type=="implant"){t="Implants";d="Permanent solution";}
document.getElementById("title").innerHTML=t;
document.getElementById("desc").innerHTML=d;
document.getElementById("popup").style.display="block";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
